spring.application.name=application_service
server.port=8083
app.jwt.secret=a4558b80-6594-4f4f-910b-1bc2ca62dfbf

# Config connect DB
spring.datasource.url=jdbc:mysql://localhost:3306/application_recuirment
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Config Hibernate / JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Turn on log for debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.results.loading=trace