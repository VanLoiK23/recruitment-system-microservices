spring.application.name=auth-service
server.port=8081
spring.cloud.compatibility-verifier.enabled=false

app.jwt.secret=a4558b80-6594-4f4f-910b-1bc2ca62dfbf
app.jwt.expire=900000
app.jwt.refresh-expire=604800000

url.front-end=http://localhost:5173/

# Config connect DB
#spring.datasource.url=jdbc:mysql://localhost:3306/auth_recuirment
spring.datasource.url=jdbc:mysql://localhost:3307/auth_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Config Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Turn on log for debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.results.loading=trace

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.data.redis.password=

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${EMAIL_SEND:your_email_send}

spring.mail.password=${EMAIL_APP_PASSWORD:your_default_app_password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.default-encoding=UTF-8
