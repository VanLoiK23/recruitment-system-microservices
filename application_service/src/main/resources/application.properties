spring.application.name=application_service
server.port=8083
app.jwt.secret=a4558b80-6594-4f4f-910b-1bc2ca62dfbf

# Config connect DB
#spring.datasource.url=jdbc:mysql://localhost:3306/application_recuirment
spring.datasource.url=jdbc:mysql://localhost:3308/application_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Config Hibernate / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Turn on log for debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.results.loading=trace

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_default_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_default_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_default_api_secret}

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
